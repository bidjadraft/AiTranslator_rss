name: RSS Translator

on:
  schedule:
    - cron: '0 * * * *'  # كل ساعة
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install feedparser==6.0.10 requests==2.31.0
    
    - name: Create proper feed.xml if empty or missing
      run: |
        echo "=== Ensuring feed.xml exists ==="
        
        if [ ! -f "feed.xml" ] || [ ! -s "feed.xml" ]; then
          echo "Creating proper feed.xml..."
          cat > feed.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<rss version="2.0">
  <channel>
    <title>Translated RSS Feeds</title>
    <description>Automatically translated RSS feeds from multiple sources</description>
    <link>https://github.com/${{ github.repository }}</link>
    <language>ar</language>
    <lastBuildDate>$(date -R)</lastBuildDate>
  </channel>
</rss>
EOF
          echo "✅ feed.xml created"
        else
          echo "✅ feed.xml already exists"
        fi
        
        # Create other required files
        [ ! -f "last_post_id.txt" ] && touch last_post_id.txt
        [ ! -f "rss_translator.log" ] && echo "Log created: $(date)" > rss_translator.log
    
    - name: Run RSS translator
      run: |
        echo "=== Running RSS Translator ==="
        python main.py
        
        echo ""
        echo "=== Results Summary ==="
        echo "feed.xml size: $(wc -c < feed.xml) bytes"
        echo "Items in feed.xml: $(grep -c '<item>' feed.xml 2>/dev/null || echo '0')"
        echo "Last processed ID: $(cat last_post_id.txt 2>/dev/null || echo 'None')"
    
    - name: Commit and push changes
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "=== Committing Changes ==="
        
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        
        # Check if there are actual changes
        git add feed.xml last_post_id.txt rss_translator.log
        
        if ! git diff --cached --quiet; then
          git commit -m "🤖 Update: RSS translation $(date '+%Y-%m-%d %H:%M:%S')"
          git push
          echo "✅ Changes pushed"
        else
          echo "⏭️ No changes to commit"
        fi
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: rss-output
        path: |
          feed.xml
          last_post_id.txt
          rss_translator.log
        retention-days: 7